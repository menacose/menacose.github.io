name: Sync Outlook Calendar

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"

permissions:
  contents: write

jobs:
  sync-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show trigger
        run: echo "Triggered by ${{ github.event_name }}"

      - name: Pull Outlook calendar into Jekyll data
        env:
          OUTLOOK_CALENDAR_ICS_URL: ${{ secrets.OUTLOOK_CALENDAR_ICS_URL }}
          CALENDAR_LOOKBACK_DAYS: "30"
          CALENDAR_LOOKAHEAD_DAYS: "730"
          CALENDAR_ALLOW_EMPTY_SYNC: "false"
        run: python scripts/sync_outlook_calendar.py

      - name: Commit synced calendar updates
        run: |
          if git diff --quiet -- _data/homepage.yml _posts/synced; then
            echo "No calendar changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/homepage.yml _posts/synced
          git commit -m "chore: sync Outlook calendar"
          git push
